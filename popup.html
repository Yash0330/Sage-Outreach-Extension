<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 250px;
        padding: 15px;
        text-align: center;
      }
      button {
        background-color: #0a66c2;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
        font-weight: bold;
      }
      button:hover {
        background-color: #004182;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        color: green;
        font-weight: bold;
      }
      .input-group {
        margin-top: 10px;
        text-align: left;
        font-size: 14px;
      }
      input[type="number"] {
        width: 50px;
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <h3>Sage Outreach</h3>

    <div class="input-group">
      <label for="pageLimit">Pages to scrape:</label>
      <input type="number" id="pageLimit" value="3" min="1" max="100" />
    </div>

    <button id="scrapeBtn">1. Scrape Companies</button>
    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
