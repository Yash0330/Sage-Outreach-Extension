<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 260px;
        padding: 15px;
        text-align: center;
      }
      h3 {
        margin-bottom: 5px;
      }
      .btn-scrape {
        background-color: #0a66c2;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 5px;
      }
      .btn-scrape:hover {
        background-color: #004182;
      }
      .btn-load {
        background-color: #f59e0b;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .btn-load:hover {
        background-color: #d97706;
      }
      .btn-connect {
        background-color: #057642;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 5px;
      }
      .btn-connect:hover {
        background-color: #034f2c;
      }
      .btn-sync {
        background-color: #6b21a8;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
      }
      .btn-sync:hover {
        background-color: #4c1d95;
      }
      #status {
        margin-top: 15px;
        font-size: 12px;
        color: #333;
        font-weight: bold;
      }
      .input-group {
        text-align: left;
        font-size: 13px;
        margin-bottom: 10px;
      }
      input[type="number"] {
        width: 50px;
        padding: 3px;
      }
      select {
        width: 100%;
        padding: 5px;
        margin-top: 4px;
      }
      hr {
        border: 0;
        height: 1px;
        background: #ddd;
        margin: 15px 0;
      }
    </style>
  </head>
  <body>
    <h3>Sage Outreach</h3>

    <div class="input-group">
      <label for="pageLimit">Pages to scrape:</label>
      <input type="number" id="pageLimit" value="3" min="1" max="10" />
    </div>
    <button id="scrapeBtn" class="btn-scrape">1. Scrape Companies</button>

    <hr />

    <button id="loadTargetBtn" class="btn-load">2. Load Next Target</button>

    <div class="input-group">
      <label for="connectLimit">Max connects per company:</label>
      <input type="number" id="connectLimit" value="5" min="1" max="10" />
    </div>
    <button id="connectBtn" class="btn-connect">3. Run Outreach Bot</button>

    <hr />

    <div class="input-group">
      <label for="inviteOwner">Sent invites account:</label>
      <select id="inviteOwner">
        <option value="yash">Yash</option>
        <option value="ruhal">Ruhal</option>
      </select>
    </div>
    <button id="scrapeInvitesBtn" class="btn-sync">
      4. Scrape Sent Invites
    </button>

    <div id="status"></div>

    <button
      id="syncBtn"
      class="btn-sync"
      style="background-color: #0284c7; margin-top: 5px"
    >
      5. Sync Connections
    </button>

    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
