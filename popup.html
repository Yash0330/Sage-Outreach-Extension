<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 260px;
        padding: 15px;
        text-align: center;
      }
      h3 {
        margin-bottom: 5px;
      }
      .btn-scrape {
        background-color: #0a66c2;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 15px;
      }
      .btn-load {
        background-color: #f59e0b;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 15px;
      }
      .btn-sync {
        background-color: #6b21a8;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 5px;
      }
      .btn-sync:hover {
        background-color: #4c1d95;
      }
      #status {
        margin-top: 15px;
        font-size: 12px;
        color: #333;
        font-weight: bold;
      }
      hr {
        border: 0;
        height: 1px;
        background: #ddd;
        margin: 15px 0;
      }
    </style>
  </head>
  <body>
    <h3>Sage Outreach</h3>

    <button id="scrapeBtn" class="btn-scrape">1. Scrape Companies</button>
    <button id="loadTargetBtn" class="btn-load">2. Load Next Target</button>

    <hr />

    <button id="scrapeInvitesBtn" class="btn-sync">
      3. Scrape Sent Invitations
    </button>

    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
